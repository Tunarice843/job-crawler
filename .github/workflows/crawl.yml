name: 채용공고 크롤링 (일 1회)

on:
  schedule:
    # UTC 00:00 = 한국시간(KST) 매일 오전 9시
    - cron: "0 0 * * *"
  workflow_dispatch:        # GitHub 화면에서 수동 실행 버튼

permissions:
  contents: write           # jobs.json 커밋/푸시 권한

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 크롤러 실행
        run: python -m crawler.run

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore: 채용공고 자동 갱신 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
