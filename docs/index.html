<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>채용공고 모니터링</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">📋 채용공고 모니터링</h1>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 통계 섹션 -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-label">표시 중인 공고</div>
                    <div class="stat-value" id="totalJobs">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🕒</div>
                <div class="stat-info">
                    <div class="stat-label">마지막 수집</div>
                    <div class="stat-value" id="updatedAt" style="font-size: 0.95rem;">-</div>
                </div>
            </div>
        </div>

        <!-- 필터 섹션 -->
        <div class="filter-section">
            <div class="filter-group">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 제목 검색...">
            </div>
            <div class="filter-group">
                <select id="companyFilter" class="filter-select">
                    <option value="">전체 회사</option>
                    <option value="삼성">삼성</option>
                    <option value="SK">SK</option>
                    <option value="LG">LG</option>
                    <option value="현대차">현대차</option>
                    <option value="기아차">기아차</option>
                </select>
            </div>
            <div class="filter-group filter-group-inline">
                <label class="toggle-label">
                    <input type="checkbox" id="hideCheckedToggle">
                    <span>확인 완료 숨기기</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="hideExpiredToggle">
                    <span>마감된 공고 숨기기</span>
                </label>
            </div>
        </div>

        <!-- 공고 리스트 -->
        <div class="job-list" id="jobList">
            <div class="loading">
                <div class="spinner"></div>
                <p>공고를 불러오는 중...</p>
            </div>
        </div>

        <!-- 빈 상태 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📭</div>
            <p>표시할 공고가 없습니다</p>
        </div>
    </div>

    <script src="js/main.js?v=20260603"></script>
</body>
</html>
